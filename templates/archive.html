<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="generator" content="Metis Daily Brief">
  <title>Metis {{ region_display }} &mdash; Archive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background-color: #f8f9fa;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: #2c7be5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    a:focus-visible { outline: 2px solid #2c7be5; outline-offset: 2px; border-radius: 2px; }
    .container { max-width: 48rem; margin-inline: auto; padding-inline: 1rem; }
    .masthead {
      background-color: #2c3e50;
      color: #f0f0f0;
      padding: 1.5rem 0;
      margin-bottom: 2rem;
    }
    .masthead__pub {
      font-size: 0.6875rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.25rem;
    }
    .masthead__region {
      font-size: clamp(1.25rem, 3vw, 1.875rem);
      font-weight: 600;
    }
    .archive-list {
      list-style: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }
    .archive-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid #e0e0e0;
      background-color: #fff;
    }
    .archive-item:last-child { border-bottom: none; }
    .archive-item:nth-child(even) { background-color: #f8f9fa; }
    .color-dot {
      flex-shrink: 0;
      display: inline-block;
      width: 0.625rem;
      height: 0.625rem;
      border-radius: 50%;
    }
    .color-dot--Red   { background-color: #c0392b; }
    .color-dot--Amber { background-color: #e67e22; }
    .color-dot--Green { background-color: #27ae60; }
    .archive-item__date { font-weight: 500; }
    .archive-item__link { font-size: 0.875rem; color: #5a7080; margin-left: auto; }
    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: #888;
      font-size: 0.9375rem;
    }
    .brief-footer {
      margin-top: 2rem;
      padding-block: 1rem;
      border-top: 1px solid #e0e0e0;
      font-size: 0.75rem;
      color: #888;
      text-align: center;
    }
    @media print {
      .masthead { background-color: #000 !important; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <header class="masthead">
    <div class="container">
      <p class="masthead__pub">Metis Daily Brief</p>
      <h1 class="masthead__region">{{ region_display }} &mdash; Archive</h1>
    </div>
  </header>

  <main class="container">
    {% if entries %}
    <ul class="archive-list" aria-label="Past editions">
      {% for entry in entries %}
      <li class="archive-item">
        <span class="color-dot color-dot--{{ entry.color }}" aria-label="{{ entry.color }} day"></span>
        <span class="archive-item__date">{{ entry.date.strftime("%A, %d %B %Y") }}</span>
        <a class="archive-item__link" href="{{ entry.date.isoformat() }}/index.html">
          Read brief &rarr;
        </a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <div class="empty-state">No past editions yet.</div>
    {% endif %}
  </main>

  <footer class="container brief-footer">
    Metis &mdash; {{ region_display }} Archive &mdash;
    <a href="index.html">Latest edition</a>
  </footer>
</body>
</html>
