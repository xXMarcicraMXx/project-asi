# config/news_sources.yaml
# Feed registry for Metis v2 news collection.
#
# All feeds verified accessible from VPS on 2026-03-15.
# Replacements from geo-block test:
#   Axios (403)           → Politico US
#   MercoPress (403)      → InSight Crime
#   Daily Maverick (403)  → BBC Africa
#   The Africa Report (403) → VOA Africa
#   SCMP (301→200)        → kept (redirect resolves)
#
# Structure:
#   global:  included in every region's story pool
#   regions: per-region feeds merged with global pool

global:
  - url: "https://feeds.reuters.com/reuters/topNews"
    name: "Reuters"
    category_hint: null

  - url: "https://rsshub.app/apnews/topics/ap-top-news"
    name: "AP News"
    category_hint: null

  - url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    name: "BBC World"
    category_hint: null

  - url: "https://www.theguardian.com/world/rss"
    name: "Guardian World"
    category_hint: null

  - url: "https://techcrunch.com/feed/"
    name: "TechCrunch"
    category_hint: "Tech"

  - url: "https://www.theverge.com/rss/index.xml"
    name: "The Verge"
    category_hint: "Tech"

  - url: "https://www.ft.com/rss/home"
    name: "Financial Times"
    category_hint: "Finance"

  - url: "https://feeds.bloomberg.com/markets/news.rss"
    name: "Bloomberg Markets"
    category_hint: "Finance"

