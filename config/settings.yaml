models:
  writer: claude-sonnet-4-20250514
  parser: claude-haiku-4-5-20251001

pinecone:
  index_name: asi-personas
  top_k: 2
  embedding_model: llama-text-embed-v2   # Pinecone inference model
  embedding_dimension: 1024              # must match index dimensions

cost:
  max_usd_per_job: 2.00

logging:
  level: INFO
  format: json

scheduler:
  cron: "0 7 * * *"
  default_regions: [EU, LATAM, SEA, NA]
  default_topics:
    - "global economic outlook and central bank policy"
    - "geopolitical tensions and trade policy implications"
    - "artificial intelligence regulation and governance"
    - "energy transition and climate policy economics"
    - "emerging market debt and currency pressures"
